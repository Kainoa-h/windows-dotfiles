  # --------------------------------------------------------
  # Move Window to Workspace AND Focus It (Alt + Shift + Letter)
  # --------------------------------------------------------

  - commands: ['move --workspace A', 'focus --workspace A']
    bindings: ['alt+shift+a']
  - commands: ['move --workspace B', 'focus --workspace B']
    bindings: ['alt+shift+b']
